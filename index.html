<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volt Cards Iraq</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* تصميم Volt 2.0 - Glassmorphism & Neon */
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(30, 41, 59, 0.4);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
            --sheet-bg: #111827;
            --neon-glow: 0 0 15px rgba(139, 92, 246, 0.5);
            --neon-glow-strong: 0 0 25px rgba(139, 92, 246, 0.8);
            --glass-blur: blur(12px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; padding-bottom: 90px;
            background-image: radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%), radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 25%);
            background-attachment: fixed;
        }

        .glass-panel { background: var(--card-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 16px; }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background: rgba(11, 15, 25, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 1.6rem; font-weight: 900; color: white; text-decoration: none; display: flex; align-items: center; gap: 8px; text-shadow: 0 0 10px var(--primary); }
        .logo i { color: var(--primary); animation: pulse 2s infinite; }

        .search-container { padding: 15px 20px; position: sticky; top: 65px; z-index: 99; background: transparent; }
        .search-input { width: 100%; padding: 14px 45px 14px 15px; border-radius: 16px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-main); font-size: 1rem; outline: none; transition: 0.3s; backdrop-filter: var(--glass-blur); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-input:focus { border-color: var(--primary); box-shadow: var(--neon-glow); }
        .search-box i { position: absolute; top: 50%; right: 35px; transform: translateY(-50%); color: var(--text-muted); }

        .categories-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 5px 20px 20px; scroll-behavior: smooth; }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .filter-chip { flex-shrink: 0; background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); padding: 8px 22px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: 0.3s; color: var(--text-main); }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: var(--neon-glow); transform: translateY(-2px); }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; margin-bottom: 25px; }
        .product-card { background: var(--card-bg); backdrop-filter: var(--glass-blur); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; position: relative; transition: all 0.4s ease; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .product-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: var(--neon-glow-strong); }
        
        .product-img { width: 100%; height: 130px; display: flex; justify-content: center; align-items: center; padding: 15px; position: relative; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .product-img img { max-width: 90%; max-height: 90%; object-fit: contain; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5)); }
        .product-card:hover .product-img img { transform: scale(1.15) rotate(3deg); }
        
        .product-info { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-cat { color: var(--primary); font-size: 0.75rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .product-title { font-size: 0.95rem; font-weight: 800; margin-bottom: 10px; line-height: 1.4; }
        .price-new { color: var(--success); font-size: 1.2rem; font-weight: 900; text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); margin-bottom: 12px; }
        
        .btn-buy { width: 100%; padding: 12px; background: linear-gradient(45deg, var(--primary), #a855f7); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        .btn-buy:hover, .btn-buy:active { transform: scale(0.95); box-shadow: var(--neon-glow-strong); }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); display: flex; border-radius: 30px; padding: 10px 5px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); text-decoration: none; font-size: 0.75rem; font-weight: 800; gap: 6px; transition: 0.3s; cursor: pointer; }
        .nav-item i { font-size: 1.3rem; transition: 0.3s; }
        .nav-item.active { color: white; text-shadow: 0 0 10px var(--primary); }
        .nav-item.active i { color: var(--primary); transform: translateY(-4px) scale(1.1); filter: drop-shadow(0 0 8px var(--primary)); }

        .sheet-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 10000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--sheet-bg); border-radius: 30px 30px 0 0; z-index: 10001; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); max-height: 90vh; display: flex; flex-direction: column; border-top: 1px solid var(--border-color); box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-content { padding: 0 25px 30px; overflow-y: auto; }
        .sheet-drag-handle { width: 50px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 5px; margin: 15px auto; }

        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 0.95rem; font-weight: 800; color: white; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: white; border-radius: 14px; outline: none; font-size: 1rem; transition: 0.3s; }
        .form-input:focus { border-color: var(--primary); box-shadow: inset 0 0 10px rgba(139, 92, 246, 0.2), 0 0 15px rgba(139, 92, 246, 0.3); }

        .upload-area { border: 2px dashed rgba(139, 92, 246, 0.5); padding: 25px; text-align: center; border-radius: 16px; background: rgba(139, 92, 246, 0.05); position: relative; transition: 0.3s; cursor: pointer; }
        .upload-area input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .upload-preview { max-width: 100%; max-height: 200px; margin-top: 15px; border-radius: 12px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 1px solid var(--primary); }

        .payment-box { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 25px; }
        .payment-box h4 { color: var(--success); margin-bottom: 10px; font-weight: 800; }
        .copy-number { display: inline-flex; align-items: center; gap: 10px; background: var(--success); color: white; padding: 10px 25px; border-radius: 12px; font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; cursor: pointer; }

        .order-item { background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); padding: 18px; border-radius: 16px; margin-bottom: 15px; }
        .badge-status { padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; display: inline-flex; align-items: center; gap: 5px;}
        .status-pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); border: 1px solid rgba(245, 158, 11, 0.5); }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.5); }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.5); }
        .admin-msg-box { margin-top: 15px; padding: 15px; background: rgba(139, 92, 246, 0.15); border-right: 4px solid var(--primary); border-radius: 8px; color: white; font-weight: 800; }

        .global-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: 0.5s; }
        .loader-icon { font-size: 5rem; color: var(--primary); animation: pulse 1s infinite alternate; filter: drop-shadow(0 0 20px var(--primary)); margin-bottom: 20px; }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px); background: var(--success); color: white; padding: 12px 25px; border-radius: 30px; font-weight: bold; z-index: 20000; transition: 0.4s; }
        .toast.show { transform: translate(-50%, 0); }

        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="loader" class="global-loader">
        <i class="fa-solid fa-bolt loader-icon"></i>
        <h2 style="font-weight: 900; letter-spacing: 2px;">VOLT CARDS</h2>
    </div>

    <header>
        <a href="#" class="logo" onclick="switchView('home')"><i class="fa-solid fa-bolt"></i> VOLT</a>
        <i class="fa-brands fa-telegram" style="color: #24A1DE; font-size: 1.8rem;" onclick="window.open('https://t.me/HH0O_1', '_blank')"></i>
    </header>

    <div id="home-section">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن لعبة، باقة..." oninput="filterSearch(event)">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
        </div>

        <div class="categories-scroll" id="categories-container">
            <div class="filter-chip active" onclick="filterCat('all', this)">الكل</div>
            <div class="filter-chip" onclick="filterCat('mobile', this)">ألعاب الجوال</div>
            <div class="filter-chip" onclick="filterCat('cards', this)">بطاقات ومتاجر</div>
        </div>

        <main id="products-container" style="padding-bottom: 20px;"></main>
    </div>

    <div id="inbox-section" style="display: none; padding: 20px;">
        <h2 style="margin-bottom: 20px; color: white;"><i class="fa-solid fa-envelope-open-text"></i> صندوق الرسائل والطلبات</h2>
        <div id="myOrdersList"></div>
    </div>

    <div id="admin-section" style="display: none; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: var(--danger);"><i class="fa-solid fa-user-shield"></i> لوحة التحكم</h2>
            <button onclick="loadAdminOrders()" style="background: var(--primary); border: none; padding: 8px 15px; border-radius: 8px; color: white; cursor:pointer;">تحديث <i class="fa-solid fa-rotate"></i></button>
        </div>
        <div id="adminOrdersList"></div>
    </div>

    <nav class="bottom-nav">
        <a class="nav-item active" id="nav-home" onclick="switchView('home')"><i class="fa-solid fa-house"></i> الرئيسية</a>
        <a class="nav-item" id="nav-inbox" onclick="switchView('inbox')"><i class="fa-solid fa-envelope"></i> رسائلي</a>
        <a class="nav-item" onclick="openSheet('settingsSheet')"><i class="fa-solid fa-gear"></i> الإعدادات</a>
    </nav>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeAllSheets()"></div>

    <div class="bottom-sheet" id="purchaseSheet">
        <div class="sheet-drag-handle"></div>
        <div class="sheet-content">
            <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-cart-arrow-down" style="color: var(--primary);"></i> إتمام الطلب</h2>
            <div id="formSection">
                <div class="payment-box">
                    <h4>يرجى تحويل مبلغ الطلب (آسياسيل)</h4>
                    <div class="copy-number" onclick="navigator.clipboard.writeText('07723859907'); showToast('تم النسخ!');">
                        <span>07723859907</span> <i class="fa-regular fa-copy"></i>
                    </div>
                </div>

                <form id="checkoutForm">
                    <input type="hidden" id="selectedCardName">
                    <input type="hidden" id="selectedCardPrice">
                    
                    <div class="form-group">
                        <label class="form-label">الاسم الكامل</label>
                        <input type="text" id="userName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">رقم هاتفك (الذي حولت منه)</label>
                        <input type="tel" id="transferPhone" class="form-input" required placeholder="077XXXXXXXX" dir="ltr" style="text-align: right;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">إثبات التحويل (صورة الوصل)</label>
                        <div class="upload-area">
                            <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 10px;"></i>
                            <p>اضغط لرفع صورة رسالة التحويل</p>
                            <input type="file" id="receiptImg" accept="image/*" required onchange="previewImage(event)">
                        </div>
                        <img id="imagePreview" class="upload-preview">
                    </div>
                    <button type="submit" class="btn-buy" id="submitBtn" style="margin-top: 20px; padding: 15px;">
                        <span id="btnText">إرسال الطلب واعتماد الدفع <i class="fa-solid fa-paper-plane"></i></span>
                    </button>
                </form>
            </div>
            <div id="successSection" style="display: none; text-align: center; padding: 30px 0;">
                <i class="fa-solid fa-circle-check" style="font-size: 5rem; color: var(--success); margin-bottom: 20px;"></i>
                <h2 style="color: var(--success);">تم استلام طلبك بنجاح!</h2>
                <p>سيتم مراجعة الدفع وإرسال الكود لك في قسم (رسائلي).</p>
                <button class="btn-buy" onclick="closeAllSheets(); switchView('inbox');">متابعة حالة الطلب</button>
            </div>
        </div>
    </div>

    <div class="bottom-sheet" id="settingsSheet">
        <div class="sheet-drag-handle"></div>
        <div class="sheet-content">
            <h2 style="margin-bottom: 25px;"><i class="fa-solid fa-gear"></i> الإعدادات</h2>
            <button class="btn-buy" onclick="adminLogin()" style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger);">
                <i class="fa-solid fa-shield-halved"></i> تسجيل دخول الإدارة (خاص)
            </button>
        </div>
    </div>

    <div class="toast" id="toast">رسالة!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // إعدادات قاعدة البيانات الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyB6bqBKnoRbFGMHJfs47av3ikUE3AIEb74",
            authDomain: "volt-763e6.firebaseapp.com",
            projectId: "volt-763e6",
            messagingSenderId: "239401900117",
            appId: "1:239401900117:web:4c00d03c72e604a79e5cdc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // مفتاح IMGBB لرفع الصور
        const IMGBB_API_KEY = "58ffaf3be2f46af1d7bd3c67fd08986f";

        let deviceId = localStorage.getItem('volt_device_id');
        if(!deviceId) { deviceId = 'DEV_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('volt_device_id', deviceId); }

        const proxy = "https://wsrv.nl/?url=";
        const products = [
            { cat: 'mobile', img: "https://i.ibb.co/wr7mHdYG/images-18.jpg", name: "كود شحن ببجي - 325 شدة", price: 5000 },
            { cat: 'mobile', img: "https://i.ibb.co/wr7mHdYG/images-18.jpg", name: "كود شحن ببجي - 660 شدة", price: 10000 },
            { cat: 'cards', img: proxy + "upload.wikimedia.org/wikipedia/commons/e/e0/Razer_Inc._Logo.svg", name: "ريزر جولد - 10$", price: 16500 },
            { cat: 'cards', img: proxy + "upload.wikimedia.org/wikipedia/commons/2/2a/Apple_Music_logo.svg", name: "بطاقة ايتونز - 10$", price: 15500 }
        ];

        window.addEventListener('load', () => {
            renderProducts('all');
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(()=>document.getElementById('loader').style.display = 'none', 500); }, 800);
        });

        window.switchView = function(view) {
            document.getElementById('home-section').style.display = 'none'; document.getElementById('inbox-section').style.display = 'none'; document.getElementById('admin-section').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(view === 'home') { document.getElementById('home-section').style.display = 'block'; document.getElementById('nav-home').classList.add('active'); }
            if(view === 'inbox') { document.getElementById('inbox-section').style.display = 'block'; document.getElementById('nav-inbox').classList.add('active'); loadClientOrders(); }
            if(view === 'admin') { document.getElementById('admin-section').style.display = 'block'; loadAdminOrders(); }
        };

        window.openSheet = id => { document.getElementById('sheetOverlay').classList.add('active'); document.getElementById(id).classList.add('active'); };
        window.closeAllSheets = () => { document.getElementById('sheetOverlay').classList.remove('active'); document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active')); };
        window.showToast = msg => { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); };
        window.previewImage = e => { const f = e.target.files[0]; const img = document.getElementById("imagePreview"); if(f) { const r = new FileReader(); r.onload = () => { img.src = r.result; img.style.display = "block"; }; r.readAsDataURL(f); } };
        window.filterCat = (cat, btn) => { document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderProducts(cat); };
        window.filterSearch = e => { const q = e.target.value.toLowerCase(); const filtered = products.filter(p => p.name.toLowerCase().includes(q)); renderGrid(filtered); };

        function renderProducts(catFilter) { renderGrid(catFilter === 'all' ? products : products.filter(p => p.cat === catFilter)); }
        function renderGrid(arr) {
            const container = document.getElementById('products-container');
            if(arr.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">لا توجد نتائج</div>'; return; }
            let html = '<div class="products-grid">';
            arr.forEach(p => { html += `<div class="product-card glass-panel"><div class="product-img"><img src="${p.img}"></div><div class="product-info"><span class="product-cat">${p.cat === 'mobile' ? 'ألعاب جوال' : 'بطاقات'}</span><h3 class="product-title">${p.name}</h3><div class="price-new">${p.price.toLocaleString()} د.ع</div><button class="btn-buy" onclick="initOrder('${p.name}', ${p.price})">شراء الآن</button></div></div>`; });
            container.innerHTML = html + '</div>';
        }

        window.initOrder = (name, price) => { document.getElementById('selectedCardName').value = name; document.getElementById('formSection').style.display = 'block'; document.getElementById('successSection').style.display = 'none'; openSheet('purchaseSheet'); };

        // 🚀 إرسال الطلب (رفع الصورة لـ ImgBB وحفظ البيانات في فايربيس)
        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const file = document.getElementById('receiptImg').files[0];
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('transferPhone').value;
            const prodName = document.getElementById('selectedCardName').value;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...'; btn.disabled = true;

            try {
                // 1. رفع الصورة إلى ImgBB
                const formData = new FormData();
                formData.append('image', file);
                
                const imgbbResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const imgData = await imgbbResponse.json();
                
                if (!imgData.success) throw new Error("فشل رفع الصورة");
                const imageUrl = imgData.data.url;

                // 2. حفظ بيانات الطلب في Firestore
                await addDoc(collection(db, "orders"), {
                    deviceId: deviceId, customerName: name, phone: phone, productName: prodName, imageUrl: imageUrl,
                    status: 'pending', adminMessage: '', timestamp: serverTimestamp()
                });

                document.getElementById('formSection').style.display = 'none';
                document.getElementById('successSection').style.display = 'block';
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } catch (error) {
                alert("حدث خطأ أثناء الإرسال. تأكد من اتصالك بالإنترنت.");
                console.log(error);
            } finally {
                btn.innerHTML = 'إرسال الطلب واعتماد الدفع'; btn.disabled = false;
            }
        });

        // 🚀 جلب طلبات العميل
        async function loadClientOrders() {
            const list = document.getElementById('myOrdersList');
            list.innerHTML = 'جاري التحميل...';
            try {
                const q = query(collection(db, "orders"), where("deviceId", "==", deviceId), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                let html = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    let statusHtml = data.status === 'completed' ? '<span class="badge-status status-completed">مكتمل</span>' : (data.status === 'rejected' ? '<span class="badge-status status-rejected">مرفوض</span>' : '<span class="badge-status status-pending">مراجعة</span>');
                    let msgHtml = data.adminMessage ? `<div class="admin-msg-box">💬 رسالة الإدارة:<br><span style="color:var(--primary);">${data.adminMessage}</span></div>` : '';
                    html += `<div class="order-item"><div style="display:flex; justify-content:space-between; margin-bottom:10px;"><strong>${data.productName}</strong>${statusHtml}</div>${msgHtml}</div>`;
                });
                list.innerHTML = html || 'لا توجد طلبات سابقة';
            } catch(e) { list.innerHTML = 'خطأ'; }
        }

        // ==============================================
        // 🛡️ لوحة التحكم السرية للمدير
        // ==============================================
        window.adminLogin = () => { if(prompt("أدخل كلمة المرور:") === "volt2026") { closeAllSheets(); switchView('admin'); } else { alert("خطأ!"); } };

        window.loadAdminOrders = async () => {
            const list = document.getElementById('adminOrdersList'); list.innerHTML = 'جاري التحميل...';
            try {
                const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));
                const snapshot = await getDocs(q);
                let html = '';
                snapshot.forEach((docSnap) => {
                    const d = docSnap.data(); const docId = docSnap.id;
                    html += `
                    <div class="order-item" style="border: 1px solid ${d.status==='pending'?'var(--primary)':'var(--border-color)'}">
                        <h3 style="color:var(--primary); margin-bottom:10px;">${d.productName}</h3>
                        <p>👤 <b>الاسم:</b> ${d.customerName}</p>
                        <p>📞 <b>رقم المحول:</b> ${d.phone}</p>
                        <div style="margin: 10px 0;"><a href="${d.imageUrl}" target="_blank" style="color:var(--success); text-decoration:underline;">🖼️ عرض صورة الوصل</a></div>
                        <p style="margin-bottom:10px;">الحالة: <b>${d.status}</b></p>
                        ${d.status === 'pending' ? `
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button onclick="adminAction('${docId}', 'accept')" style="flex:1; padding:10px; background:var(--success); border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;">✅ إرسال الكود</button>
                            <button onclick="adminAction('${docId}', 'reject')" style="flex:1; padding:10px; background:var(--danger); border:none; border-radius:8px; color:white; font-weight:bold; cursor:pointer;">❌ رفض</button>
                        </div>
                        ` : `<div>💬 رسالتك: ${d.adminMessage}</div>`}
                    </div>`;
                });
                list.innerHTML = html;
            } catch(e) { list.innerHTML = 'خطأ'; }
        };

        window.adminAction = async (docId, action) => {
            let msg = prompt(action === 'accept' ? "اكتب كود البطاقة لإرساله للعميل:" : "اكتب سبب الرفض:");
            if(msg) {
                try {
                    await updateDoc(doc(db, "orders", docId), { status: action === 'accept' ? 'completed' : 'rejected', adminMessage: msg });
                    showToast("تم التحديث!"); window.loadAdminOrders();
                } catch(e) { alert("حدث خطأ"); }
            }
        };
    </script>
</body>
</html>
